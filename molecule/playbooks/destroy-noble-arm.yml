---
- name: Destroy
  hosts: localhost
  connection: local
  gather_facts: false
  no_log: false
  tasks:
    - block:
        - name: Populate instance config
          set_fact:
            instance_conf: "{{ lookup('file', molecule_instance_config) | from_yaml }}"
            skip_instances: false
      rescue:
        - name: Handle missing molecule_instance_config file
          set_fact:
            instance_conf: []
            skip_instances: true

    - name: Debug instance config if file missing
      debug:
        msg: "The molecule_instance_config file is missing. Skipping instance destruction."
      when: skip_instances

    - name: Check if instance config exists before proceeding
      debug:
        msg: "instance_conf is empty or the file was missing, skipping destruction."
      when: instance_conf | length == 0

    - name: Destroy molecule instance(s)
      amazon.aws.ec2:
        state: absent
        instance_ids: "{{ item.instance_id }}"
        region: "{{ item.region }}"
      register: server
      with_items: "{{ instance_conf }}"
      when: instance_conf | length > 0 and not skip_instances
      async: 7200
      poll: 0

    - name: Wait for instance(s) deletion to complete
      async_status:
        jid: "{{ item.ansible_job_id }}"
      register: ec2_jobs
      until: ec2_jobs.finished
      retries: 300
      with_items: "{{ server.results }}"
      when: instance_conf | length > 0 and not skip_instances

    # Reset instance config
    - name: Populate instance config
      set_fact:
        instance_conf: {}

    - name: Dump instance config
      copy:
        content: "{{ instance_conf | to_json | from_json | to_yaml }}"
        dest: "{{ molecule_instance_config }}"
      when: server.changed | bool